name: Deploy to Staging

on:
    push:
        branches: [staging]
    workflow_dispatch:

concurrency:
    group: deploy-staging
    cancel-in-progress: true

env:
    REGISTRY: registry.digitalocean.com/invoicekit-registry
    IMAGE_NAME: app

jobs:
    build:
        name: Build & Push Image
        runs-on: ubuntu-latest
        outputs:
            image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

        steps:
            - uses: actions/checkout@v4

            - name: Install doctl
              uses: digitalocean/action-doctl@v2
              with:
                  token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

            - name: Log in to DOCR
              run: doctl registry login --expiry-seconds 1200

            - name: Build image
              run: |
                  docker build \
                    -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                    -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest \
                    .

            - name: Push image
              run: |
                  docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                  docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest

    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        environment: staging

        steps:
            - uses: actions/checkout@v4

            - name: Install doctl
              uses: digitalocean/action-doctl@v2
              with:
                  token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

            - name: Configure kubectl
              run: doctl kubernetes cluster kubeconfig save ${{ secrets.K8S_CLUSTER_NAME }}

            - name: Sync registry pull secret
              run: doctl registry kubernetes-manifest --namespace staging | kubectl apply -f -

            - name: Update app secrets
              run: |
                  kubectl create secret generic app-secrets \
                    --namespace staging \
                    --from-literal=APP_KEY="${{ secrets.STAGING_APP_KEY }}" \
                    --from-literal=APP_ENV=staging \
                    --from-literal=APP_DEBUG=true \
                    --from-literal=APP_URL=https://staging.invoicekit.eu \
                    --from-literal=APP_DOMAIN=staging.invoicekit.eu \
                    --from-literal=DB_CONNECTION=mysql \
                    --from-literal=DB_HOST="${{ secrets.STAGING_DB_HOST }}" \
                    --from-literal=DB_PORT=25060 \
                    --from-literal=DB_DATABASE="${{ secrets.STAGING_DB_DATABASE }}" \
                    --from-literal=DB_USERNAME="${{ secrets.STAGING_DB_USERNAME }}" \
                    --from-literal=DB_PASSWORD="${{ secrets.STAGING_DB_PASSWORD }}" \
                    --from-literal=MYSQL_ATTR_SSL_CA=/etc/ssl/mysql/ca-certificate.crt \
                    --from-literal=REDIS_HOST=redis \
                    --from-literal=REDIS_PORT=6379 \
                    --from-literal=SESSION_DRIVER=redis \
                    --from-literal=CACHE_DRIVER=redis \
                    --from-literal=QUEUE_CONNECTION=redis \
                    --from-literal=LOG_CHANNEL=stderr \
                    --from-literal=STRIPE_KEY="${{ secrets.STAGING_STRIPE_KEY }}" \
                    --from-literal=STRIPE_SECRET="${{ secrets.STAGING_STRIPE_SECRET }}" \
                    --from-literal=MAIL_MAILER=smtp \
                    --from-literal=MAIL_HOST="${{ secrets.STAGING_MAIL_HOST }}" \
                    --from-literal=MAIL_PORT="${{ secrets.STAGING_MAIL_PORT }}" \
                    --from-literal=MAIL_USERNAME="${{ secrets.STAGING_MAIL_USERNAME }}" \
                    --from-literal=MAIL_PASSWORD="${{ secrets.STAGING_MAIL_PASSWORD }}" \
                    --from-literal=MAIL_FROM_ADDRESS="${{ secrets.STAGING_MAIL_FROM_ADDRESS }}" \
                    --from-literal=MAIL_FROM_NAME="InvoiceKit (Staging)" \
                    --dry-run=client -o yaml | kubectl apply -f -

            - name: Apply manifests
              run: kubectl apply -f k8s/staging/

            - name: Update deployment images
              run: |
                  IMAGE="${{ needs.build.outputs.image }}"
                  kubectl set image deployment/app \
                    copy-public="${IMAGE}" app="${IMAGE}" \
                    --namespace staging
                  kubectl set image deployment/queue-worker \
                    worker="${IMAGE}" \
                    --namespace staging

            - name: Run migrations
              run: |
                  SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
                  JOB_NAME="migrate-${SHA_SHORT}"
                  IMAGE="${{ needs.build.outputs.image }}"

                  sed \
                    -e "s|IMAGE_PLACEHOLDER|${IMAGE}|g" \
                    -e "s|JOB_NAME_PLACEHOLDER|${JOB_NAME}|g" \
                    -e "s|NAMESPACE_PLACEHOLDER|staging|g" \
                    k8s/jobs/migrate.yaml | kubectl apply -f -

                  kubectl wait "job/${JOB_NAME}" \
                    --for=condition=complete \
                    --timeout=300s \
                    --namespace staging

                  echo "=== Migration logs ==="
                  kubectl logs "job/${JOB_NAME}" --namespace staging

                  kubectl delete "job/${JOB_NAME}" --namespace staging

            - name: Wait for rollout
              run: |
                  kubectl rollout status deployment/app \
                    --namespace staging --timeout=180s
                  kubectl rollout status deployment/queue-worker \
                    --namespace staging --timeout=60s
