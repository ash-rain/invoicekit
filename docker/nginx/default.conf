server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    # Use Docker's internal DNS so nginx re-resolves the app container
    # hostname on every request. Without this, nginx caches the IP at
    # startup and returns 502 after the app container is recreated.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off; log_not_found off;
    }
    location = /robots.txt {
        access_log off; log_not_found off;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
