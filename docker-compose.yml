version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoicekit_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - PHP_FPM_PM=dynamic
    depends_on:
      - postgres
      - redis
    networks:
      - invoicekit

  nginx:
    image: nginx:alpine
    container_name: invoicekit_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - invoicekit

  postgres:
    image: postgres:16-alpine
    container_name: invoicekit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-invoicekit}
      POSTGRES_USER: ${DB_USERNAME:-invoicekit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - invoicekit

  redis:
    image: redis:7-alpine
    container_name: invoicekit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - invoicekit

networks:
  invoicekit:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
