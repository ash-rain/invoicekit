services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoicekit_app
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    volumes:
      - .:/var/www
    environment:
      - PHP_FPM_PM=dynamic
    depends_on:
      - postgres
      - redis
    networks:
      - invoicekit

  nginx:
    image: nginx:alpine
    container_name: invoicekit_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8008}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - invoicekit

  postgres:
    image: postgres:16-alpine
    container_name: invoicekit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-invoicekit}
      POSTGRES_USER: ${DB_USERNAME:-invoicekit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - invoicekit

  worker:
    image: invoicekit-app
    container_name: invoicekit_worker
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - invoicekit

  redis:
    image: redis:7-alpine
    container_name: invoicekit_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - invoicekit

  minio:
    image: minio/minio:latest
    container_name: invoicekit_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-invoicekit}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-secret123456}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    networks:
      - invoicekit

networks:
  invoicekit:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
